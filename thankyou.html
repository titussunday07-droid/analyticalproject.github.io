    <style>

        body{

            padding:0;
            font-family:Arial, sans-serif;

            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .thankyou-container{

        }

        a{

            background:#38bdf8;
            color:white;

        a:hover{
